name: Docker Build

on:
  push:
    paths:
      - '**/Dockerfile'
      - '**/Dockervar'

jobs:
  find-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get Updated Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            Dockerfile$
            Dockervar$
      - name: Get Updated Directories
        id: changed-dirs
        run: |
          RESULT=
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            RESULT="$(dirname $file) $RESULT"
          done
          RESULT=$(echo $RESULT | sed 's/ /\n/g' | sort | uniq | xargs)
          RESULT=$(echo $RESULT | jq -Rcr 'split(" ")')

          echo "all=${RESULT}" >> ${GITHUB_OUTPUT}}
      - name: List Changed Directories
        run: |
          echo '${{ steps.changed-dirs.outputs.all }}'

  build-images:
    needs: find-changes
    strategy:
      matrix:
        dir: ${{ fromJson(needs.find-changes.outputs.all) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import Build variables
        run: |
            if [ -f ${{ matrix.dir }}/Dockervar ]; then
              grep ^DOCKER_.*= ${{ matrix.dir }}/Dockervar >> ${GITHUB_ENV} || true
            fi
      - name: Prepare Build Parameters
        id: config
        run: |
            if [ -n "${DOCKER_REPO}" ]; then
              DOCKER_PUSH=true
              BUILD_TAGS="${DOCKER_REPO}:latest"
              if [ -n "${DOCKER_TAG}" ]; then
                if [ -n "${DOCKER_TAG_ONLY}" ]; then
                  BUILD_TAGS="${DOCKER_REPO}:${DOCKER_TAG}"
                else
                  BUILD_TAGS="${DOCKER_REPO}:${DOCKER_TAG},${BUILD_TAGS}"
                fi
              else
                echo "DOCKER_TAG=latest" >> ${GITHUB_ENV}
              fi
            else
              DOCKER_PUSH=false
              BUILD_TAGS="test:latest"

              echo "DOCKER_REPO=test"  >> ${GITHUB_ENV}
              echo "DOCKER_TAG=latest" >> ${GITHUB_ENV}
            fi

            echo "tags=${BUILD_TAGS}"  >> ${GITHUB_OUTPUT}
            echo "push=${DOCKER_PUSH}" >> ${GITHUB_OUTPUT}

            if [ -f ${{ matrix.dir }}/Dockervar ]; then
              BUILD_ARGS=$(cat ${{ matrix.dir }}/Dockervar | grep -v ^# | grep -v ^DOCKER | grep "\S")
              BUILD_ARGS="${BUILD_ARGS//'%'/'%25'}"
              BUILD_ARGS="${BUILD_ARGS//$'\n'/'%0A'}"
              BUILD_ARGS="${BUILD_ARGS//$'\r'/'%0D'}"

              echo "build-args=${BUILD_ARGS}" >> ${GITHUB_OUTPUT}
            fi
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.dir }}
          build-args: ${{ steps.config.outputs.build-args }}
          load: true
          push: false
          tags: ${{ steps.config.outputs.tags }}
      - name: Test Build Image
        run: |
          if [ -n "${DOCKER_TEST_ENTRYPOINT}" ] || [ -n "${DOCKER_TEST_CMD}" ]; then
            DOCKER_TEST="docker run -t"
            [ -n "${DOCKER_TEST_ENTRYPOINT}" ] && DOCKER_TEST="${DOCKER_TEST} --entrypoint=${DOCKER_TEST_ENTRYPOINT}"
            DOCKER_TEST="${DOCKER_TEST} ${DOCKER_REPO}:${DOCKER_TAG}"
            [ -n "${DOCKER_TEST_CMD}" ] && DOCKER_TEST="${DOCKER_TEST} ${DOCKER_TEST_CMD}"
            echo ${DOCKER_TEST} > /tmp/DOCKER_TEST.sh
            /bin/bash /tmp/DOCKER_TEST.sh
          else
            echo "SKIP testing..."
          fi
      - name: Build and Push Image
        uses: docker/build-push-action@v6
        if: ${{ steps.config.outputs.push == 'true' }}
        with:
          context: ${{ matrix.dir }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          build-args: ${{ steps.config.outputs.build-args }}
          tags: ${{ steps.config.outputs.tags }}
          push: true
